manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: petejohanson
      url-base: https://github.com/petejohanson
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      import: 
        # For ZMK, the import needs to be the file name string
        # followed by the filter options
        file: app/west.yml
        name-blocklist:
          - cirque
    - name: cirque-input-module
      remote: petejohanson
      revision: main
      path: modules/input/cirque
  self:
    path: config
